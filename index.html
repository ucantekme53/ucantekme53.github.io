<!DOCTYPE html>
<html lang="tr">
<head>
    <meta name="robots" content="noindex, nofollow">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❤️</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body { 
            background: radial-gradient(circle at top, #1e1b4b 0%, #090514 100%);
            color: #f8fafc; 
            text-align: center; 
            font-family: 'Inter', sans-serif; 
            min-height: 100vh;
            margin: 0;
            padding: 30px 20px;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        h1 { 
            font-family: 'Caveat', cursive;
            font-size: 3.8rem; 
            font-weight: 700;
            color: #ff6b81;
            margin-bottom: 2px;
            margin-top: 10px;
        }
        
        .subtitle {
            color: #94a3b8;
            font-size: 1.1rem;
            margin-bottom: 25px;
            font-family: 'Caveat', cursive;
            font-size: 1.8rem;
        }

        .oyun-konteyner {
            max-width: 850px;
            margin: 0 auto;
            position: relative;
        }

        canvas {
            background: #ffffff; /* Orijinal kağıt arka planı */
            border-radius: 24px;
            border: 3px solid #ff6b81;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: block;
            width: 100%;
            max-width: 850px;
            height: auto;
            cursor: pointer;
        }

        .kedi-butonu {
            position: fixed;
            right: 32px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 107, 129, 0.15);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            color: #ff6b81;
            border: 1px solid rgba(255, 107, 129, 0.3);
            padding: 14px 22px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 1000;
        }
        
        .kedi-butonu:hover {
            background: #ff6b81;
            color: white;
            transform: translateY(-50%) scale(1.05);
        }

        .modal {
            display: none; 
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(12px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .modal.aktif { display: flex; opacity: 1; }
        .modal-icerik { background: #1e293b; padding: 32px; border-radius: 28px; max-width: 480px; width: 90%; position: relative; }
        .kapat-butonu { position: absolute; top: 20px; right: 24px; font-size: 26px; color: #64748b; cursor: pointer; }
        .kedi-foto { width: 100%; height: 320px; object-fit: cover; border-radius: 20px; margin: 20px 0; }
        .degistir-butonu { background: #2ed573; color: white; border: none; padding: 14px 24px; font-size: 1rem; border-radius: 14px; cursor: pointer; font-weight: 600; width: 100%; }
    </style>
</head>
<body>

    <h1>Bak ne yaptım :)</h1>
    <div class="subtitle">Ekrana dokun blocksun...</div>

    <div class="oyun-konteyner">
        <canvas id="oyunTuvali" width="900" height="500"></canvas>
    </div>

    <button class="kedi-butonu" onclick="modaliAc()">🐱 Kedisler</button>

    <div id="kediPencerem" class="modal" onclick="pencereDisiKapat(event)">
        <div class="modal-icerik">
            <span class="kapat-butonu" onclick="modaliKapat()">&times;</span>
            <h2 style="margin: 0; font-size: 1.5rem; color: #ff6b81; font-family: 'Caveat', cursive; font-size: 2.2rem;">Günün Kedisi! 🐾</h2>
            <img id="kediResmi" src="Image (9).jpg" alt="Kedi" class="kedi-foto">
            <button class="degistir-butonu" onclick="kediDegistir()">Başka Kedi Göster 🔄</button>
        </div>
    </div>

    <script>
        // --- KEDİ GALERİSİ ---
        const kediListesi = ["Image (9).jpg", "Image (10).jpg", "Image (11).jpg", "Image (12).jpg", "Image (13).jpg", "Image (14).jpg", "Image (15).jpg"];
        let sira = 0;
        const modal = document.getElementById("kediPencerem");
        function modaliAc() { modal.style.display = "flex"; setTimeout(() => modal.classList.add("aktif"), 10); }
        function modaliKapat() { modal.classList.remove("aktif"); setTimeout(() => modal.style.display = "none", 300); }
        function kediDegistir() { sira = (sira + 1) % kediListesi.length; document.getElementById("kediResmi").src = kediListesi[sira]; }
        function pencereDisiKapat(event) { if (event.target === modal) modaliKapat(); }

        // --- ANIMASYON MOTORU ---
        const canvas = document.getElementById("oyunTuvali");
        const ctx = canvas.getContext("2d");

        let frame = 0;
        let kalpler = [];
        let efektYazilari = [];

        const kiz = {
            startX: 180,
            x: 180,
            y: 300,
            hizX: 0,
            hizY: 0,
            durum: "yuruyor", 
            animFrame: 0
        };

        const erkek = {
            x: 620,
            y: 295,
            sarsilmaX: 0,
            durum: "normal"
        };

        function tetikleUcanTekme() {
            if (kiz.durum === "yuruyor") {
                kiz.durum = "havalaniyor";
                kiz.hizY = -11;
                kiz.hizX = 13;
            }
        }

        window.addEventListener("keydown", (e) => { if (e.code === "Space") { e.preventDefault(); tetikleUcanTekme(); } });
        canvas.addEventListener("mousedown", (e) => { e.preventDefault(); tetikleUcanTekme(); });

        function drawHeart(x, y, size, color, broken = false) {
            ctx.save();
            ctx.beginPath();
            ctx.translate(x, y);
            
            if (broken) {
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(-size/2, -size/2, -size, size/3, -2, size);
                ctx.lineTo(-2, 0);
                ctx.fillStyle = color;
                ctx.fill();
                
                ctx.beginPath();
                ctx.moveTo(2, 0);
                ctx.lineTo(2, size);
                ctx.bezierCurveTo(size, size/3, size/2, -size/2, 2, 0);
                ctx.fill();
            } else {
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(-size/2, -size/2, -size, size/3, 0, size);
                ctx.bezierCurveTo(size, size/3, size/2, -size/2, 0, 0);
                ctx.fillStyle = color;
                ctx.fill();
                ctx.lineWidth = 1.5;
                ctx.strokeStyle = "#b3001e";
                ctx.stroke();
            }
            ctx.restore();
        }

        function guncelle() {
            frame++;
            kiz.animFrame++;

            if (kiz.durum === "havalaniyor") {
                kiz.x += kiz.hizX;
                kiz.y += kiz.hizY;
                kiz.hizY += 0.5;

                if (kiz.hizY > -1) {
                    kiz.durum = "tekme";
                }
            } else if (kiz.durum === "tekme") {
                kiz.x += kiz.hizX * 1.1;
                kiz.y += kiz.hizY;
                kiz.hizY += 0.5;

                // İsabet Kontrolü
                if (kiz.x + 75 >= erkek.x + erkek.sarsilmaX) {
                    erkek.durum = "darbeAldi";
                    erkek.sarsilmaX = 20;
                    kiz.durum = "geriDonuyor";
                    kiz.hizX = -9;
                    kiz.hizY = -4;

                    // Kalp parçacıkları
                    for (let i = 0; i < 6; i++) {
                        kalpler.push({
                            x: erkek.x,
                            y: erkek.y + 20,
                            hizX: (Math.random() - 0.3) * 6,
                            hizY: (Math.random() - 0.7) * 6,
                            boyut: Math.random() * 10 + 8,
                            omur: 25
                        });
                    }

                    // İstediğin özel cool tepki yazısı
                    efektYazilari.push({
                        x: erkek.x - 60,
                        y: erkek.y - 45,
                        metin: "ne yaptığına bak :)",
                        omur: 40
                    });
                }

                if (kiz.y >= 300) {
                    kiz.y = 300;
                    kiz.durum = "geriDonuyor";
                    kiz.hizX = -8;
                }
            } else if (kiz.durum === "geriDonuyor") {
                kiz.x += kiz.hizX;
                kiz.y += kiz.hizY;
                kiz.hizY += 0.5;

                if (kiz.y >= 300) {
                    kiz.y = 300;
                    kiz.hizY = 0;
                }

                if (kiz.x <= kiz.startX) {
                    kiz.x = kiz.startX;
                    kiz.durum = "yuruyor";
                }
            }

            if (erkek.durum === "darbeAldi") {
                erkek.sarsilmaX *= 0.88;
                if (erkek.sarsilmaX < 0.5) {
                    erkek.sarsilmaX = 0;
                    erkek.durum = "normal";
                }
            }

            for (let i = kalpler.length - 1; i >= 0; i--) {
                kalpler[i].x += kalpler[i].hizX;
                kalpler[i].y += kalpler[i].hizY;
                kalpler[i].omur--;
                if (kalpler[i].omur <= 0) kalpler.splice(i, 1);
            }

            for (let i = efektYazilari.length - 1; i >= 0; i--) {
                efektYazilari[i].y -= 0.5;
                efektYazilari[i].omur--;
                if (efektYazilari[i].omur <= 0) efektYazilari.splice(i, 1);
            }
        }

        function ciz() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // --- ORİJİNAL ARKA PLAN ---
            // Güneş
            ctx.fillStyle = "#ffde17";
            ctx.beginPath();
            ctx.arc(120, 100, 45, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = "#ffde17";
            ctx.lineWidth = 5;
            for(let a=0; a<Math.PI*2; a+=Math.PI/6) {
                ctx.beginPath();
                ctx.moveTo(120 + Math.cos(a)*55, 100 + Math.sin(a)*55);
                ctx.lineTo(120 + Math.cos(a)*78, 100 + Math.sin(a)*78);
                ctx.stroke();
            }

            // Bulutlar
            ctx.fillStyle = "#29b6f6";
            ctx.beginPath();
            ctx.arc(640, 80, 35, 0, Math.PI*2);
            ctx.arc(680, 70, 45, 0, Math.PI*2);
            ctx.arc(720, 80, 35, 0, Math.PI*2);
            ctx.fill();

            ctx.beginPath();
            ctx.arc(440, 100, 30, 0, Math.PI*2);
            ctx.arc(475, 90, 38, 0, Math.PI*2);
            ctx.arc(510, 100, 30, 0, Math.PI*2);
            ctx.fill();

            // Havada uçuşan orijinal arka plan kalpleri
            drawHeart(370, 160, 20, "#ff4757");
            drawHeart(790, 230, 15, "#ff4757");

            // --- KIZ KARAKTERİN ÇİZİMİ ---
            ctx.save();
            ctx.translate(kiz.x, kiz.y);

            let kx = 0, ky = 30;
            ctx.strokeStyle = "#ff6b81"; 
            ctx.lineWidth = 4;
            ctx.lineCap = "round";

            // Kafa
            ctx.beginPath(); ctx.arc(kx, ky - 18, 14, 0, Math.PI * 2); ctx.stroke();

            // Yüz detayları
            ctx.fillStyle = "#ff6b81";
            ctx.beginPath(); ctx.arc(kx - 5, ky - 20, 2, 0, Math.PI*2); ctx.arc(kx + 5, ky - 20, 2, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(kx, ky - 15, 5, 0, Math.PI); ctx.stroke();

            // Kahverengi dalgalı saçlar
            ctx.strokeStyle = "#8d6e63";
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(kx - 10, ky - 25); ctx.bezierCurveTo(kx - 25, ky - 15, kx - 15, ky, kx - 22, ky + 25);
            ctx.moveTo(kx + 10, ky - 25); ctx.bezierCurveTo(kx + 25, ky - 15, kx + 15, ky, kx + 22, ky + 25);
            ctx.stroke();

            // Pembe Fiyonk
            ctx.fillStyle = "#ff6b81";
            ctx.beginPath(); ctx.moveTo(kx - 12, ky - 28); ctx.lineTo(kx - 22, ky - 34); ctx.lineTo(kx - 22, ky - 22); ctx.closePath(); ctx.fill();
            ctx.beginPath(); ctx.moveTo(kx - 12, ky - 28); ctx.lineTo(kx - 2, ky - 34); ctx.lineTo(kx - 2, ky - 22); ctx.closePath(); ctx.fill();

            // Gövde
            ctx.strokeStyle = "#ff6b81";
            ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(kx, ky); ctx.lineTo(kx, ky + 45); ctx.stroke();

            // Kollar
            ctx.beginPath();
            if (kiz.durum === "tekme" || kiz.durum === "havalaniyor") {
                ctx.moveTo(kx, ky + 10); ctx.lineTo(kx - 16, ky - 3);
                ctx.moveTo(kx, ky + 10); ctx.lineTo(kx + 14, ky - 6);
            } else {
                let salinim = Math.sin(kiz.animFrame * 0.15) * 8;
                ctx.moveTo(kx, ky + 12); ctx.lineTo(kx - 15 + salinim, ky + 28);
                ctx.moveTo(kx, ky + 12); ctx.lineTo(kx + 15 - salinim, ky + 28);
            }
            ctx.stroke();

            // Bacaklar
            ctx.beginPath();
            if (kiz.durum === "tekme") {
                ctx.moveTo(kx, ky + 45); ctx.lineTo(kx + 44, ky + 32); 
                ctx.moveTo(kx, ky + 45); ctx.lineTo(kx - 12, ky + 62);
            } else if (kiz.durum === "havalaniyor") {
                ctx.moveTo(kx, ky + 45); ctx.lineTo(kx - 6, ky + 68);
                ctx.moveTo(kx, ky + 45); ctx.lineTo(kx + 10, ky + 66);
            } else {
                let adim = Math.sin(kiz.animFrame * 0.12) * 12;
                ctx.moveTo(kx, ky + 45); ctx.lineTo(kx - 10 + adim, ky + 80);
                ctx.moveTo(kx, ky + 45); ctx.lineTo(kx + 10 - adim, ky + 80);
            }
            ctx.stroke();

            ctx.restore();


            // --- ERKEK KARAKTERİN ÇİZİMİ (Yazılar temizlendi, gerçek el saç çizildi) ---
            ctx.save();
            ctx.translate(erkek.x + erkek.sarsilmaX, erkek.y);

            let ex = 0, ey = 30;
            ctx.strokeStyle = "#ff6b81";
            ctx.lineWidth = 4;

            // Kafa
            ctx.beginPath(); ctx.arc(ex, ey - 18, 15, 0, Math.PI * 2); ctx.stroke();

            // ARTIK METİN YOK: Orijinal fırça darbeli el çizimi siyah saç yapısı
            ctx.fillStyle = "#000000";
            ctx.beginPath();
            ctx.arc(ex - 8, ey - 32, 7, 0, Math.PI * 2);
            ctx.arc(ex, ey - 34, 8, 0, Math.PI * 2);
            ctx.arc(ex + 8, ey - 31, 7, 0, Math.PI * 2);
            ctx.fill();

            // Havalı Siyah Gözlükler (Aynen korundu)
            ctx.fillRect(ex - 14, ey - 23, 28, 10);
            ctx.strokeStyle = "#000000";
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(ex - 14, ey - 19); ctx.lineTo(ex - 18, ey - 17); ctx.stroke();

            // Ağız
            ctx.strokeStyle = "#ff6b81";
            ctx.lineWidth = 3;
            ctx.beginPath();
            if (erkek.durum === "darbeAldi") {
                ctx.arc(ex, ey - 10, 4, 0, Math.PI * 2); 
            } else {
                ctx.arc(ex, ey - 11, 5, 0, Math.PI); 
            }
            ctx.stroke();

            // Gövde ve Kollar
            ctx.lineWidth = 4;
            ctx.strokeStyle = "#ff6b81";
            ctx.beginPath(); ctx.moveTo(ex, ey); ctx.lineTo(ex, ey + 50); ctx.stroke();

            ctx.beginPath();
            if (erkek.durum === "darbeAldi") {
                ctx.moveTo(ex, ey + 12); ctx.lineTo(ex - 20, ey - 2);
                ctx.moveTo(ex, ey + 12); ctx.lineTo(ex + 20, ey - 2);
            } else {
                ctx.moveTo(ex, ey + 12); ctx.lineTo(ex - 18, ey + 28);
                ctx.moveTo(ex, ey + 12); ctx.lineTo(ex + 18, ey + 28);
            }
            ctx.stroke();

            // Koldaki Orijinal Yuvarlak Pembe Balon Yapıları
            ctx.fillStyle = "rgba(255, 107, 129, 0.6)";
            ctx.beginPath();
            ctx.arc(ex - 14, ey + 20, 10, 0, Math.PI*2);
            ctx.arc(ex + 14, ey + 20, 10, 0, Math.PI*2);
            ctx.fill();

            // Bacaklar
            ctx.beginPath();
            if (erkek.durum === "darbeAldi") {
                ctx.moveTo(ex, ey + 50); ctx.lineTo(ex - 18, ey + 85);
                ctx.moveTo(ex, ey + 50); ctx.lineTo(ex + 8, ey + 85);
            } else {
                ctx.moveTo(ex, ey + 50); ctx.lineTo(ex - 12, ey + 85);
                ctx.moveTo(ex, ey + 50); ctx.lineTo(ex + 12, ey + 85);
            }
            ctx.stroke();

            ctx.restore();


            // Efekt Kalpleri
            kalpler.forEach(p => {
                drawHeart(p.x, p.y, p.boyut / 2, "#ff4757", true);
            });

            // "ne yaptığına bak :)" yazısı (Doğal el yazısı Caveat fontuyla)
            efektYazilari.forEach(y => {
                ctx.fillStyle = "#ff4757";
                ctx.font = "bold 26px 'Caveat', cursive";
                ctx.fillText(y.metin, y.x, y.y);
            });


            // --- YEŞİL ÇİMENLİ TEPELER ---
            ctx.fillStyle = "#4caf50";
            ctx.beginPath();
            ctx.moveTo(0, canvas.height);
            for (let i = 0; i <= canvas.width + 150; i += 150) {
                ctx.lineTo(i, 400);
                ctx.bezierCurveTo(i + 50, 360, i + 100, 360, i + 150, 400);
            }
            ctx.lineTo(canvas.width, canvas.height);
            ctx.fill();
            
            ctx.strokeStyle = "#2e7d32";
            ctx.lineWidth = 4;
            ctx.beginPath();
            for (let i = 0; i <= canvas.width + 150; i += 150) {
                ctx.moveTo(i, 400);
                ctx.bezierCurveTo(i + 50, 360, i + 100, 360, i + 150, 400);
            }
            ctx.stroke();
        }

        function döngü() {
            guncelle();
            ciz();
            requestAnimationFrame(döngü);
        }

        döngü();
    </script>
</body>
</html>
