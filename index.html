<!DOCTYPE html>
<html lang="tr">
<head>
    <meta name="robots" content="noindex, nofollow">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uçan Tekme Macerası</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body { 
            background: radial-gradient(circle at top, #1e1b4b 0%, #090514 100%);
            color: #f8fafc; 
            text-align: center; 
            font-family: 'Inter', sans-serif; 
            min-height: 100vh;
            margin: 0;
            padding: 30px 20px;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        h1 { 
            font-family: 'Caveat', cursive;
            font-size: 4.5rem; 
            font-weight: 700;
            background: linear-gradient(to right, #ff4757, #ff6b81, #ff7f50);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
            margin-top: 10px;
        }
        
        .subtitle {
            color: #94a3b8;
            font-size: 1.05rem;
            margin-bottom: 20px;
        }

        .hud-instructions {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 20px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 20px;
            font-size: 0.9rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #cbd5e1;
        }

        .hud-instructions span {
            color: #ff4757;
            font-weight: 600;
        }

        .oyun-konteyner {
            max-width: 850px;
            margin: 0 auto;
            position: relative;
        }

        canvas {
            background: #ffffff; /* Beyaz kağıt efekti arka plan */
            border-radius: 24px;
            border: 4px solid #ff4757;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.8);
            display: block;
            width: 100%;
            max-width: 850px;
            height: auto;
            cursor: pointer;
        }

        .kedi-butonu {
            position: fixed;
            right: 32px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 71, 87, 0.15);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            color: #ff4757;
            border: 1px solid rgba(255, 71, 87, 0.3);
            padding: 16px 24px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 1000;
        }
        
        .kedi-butonu:hover {
            background: rgba(255, 71, 87, 0.9);
            color: white;
            transform: translateY(-50%) scale(1.05);
        }

        .modal {
            display: none; 
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(12px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .modal.aktif { display: flex; opacity: 1; }
        .modal-icerik { background: #1e293b; padding: 32px; border-radius: 28px; max-width: 480px; width: 90%; position: relative; }
        .kapat-butonu { position: absolute; top: 20px; right: 24px; font-size: 26px; color: #64748b; cursor: pointer; }
        .kedi-foto { width: 100%; height: 320px; object-fit: cover; border-radius: 20px; margin: 20px 0; }
        .degistir-butonu { background: #2ed573; color: white; border: none; padding: 14px 24px; font-size: 1rem; border-radius: 14px; cursor: pointer; font-weight: 600; width: 100%; }
    </style>
</head>
<body>

    <h1>Hesaplaşma Zamanı! 🥷</h1>
    <div class="subtitle">Image (8)_2.jpg Çizimindeki Kız Uçan Tekme Atıyor!</div>
    <div class="hud-instructions">
        <span>SPACE (Boşluk Tuşu)</span> veya <span>Ekrana Tıkla</span>: Kız Havalanıp Uçan Tekme Atar!
    </div>

    <div class="oyun-konteyner">
        <canvas id="oyunTuvali" width="900" height="500"></canvas>
    </div>

    <button class="kedi-butonu" onclick="modaliAc()">🐱 Kedisler</button>

    <div id="kediPencerem" class="modal" onclick="pencereDisiKapat(event)">
        <div class="modal-icerik">
            <span class="kapat-butonu" onclick="modaliKapat()">&times;</span>
            <h2 style="margin: 0; font-size: 1.5rem; color: #ff4757;">Günün Kedisi! 🐾</h2>
            <img id="kediResmi" src="Image (9).jpg" alt="Kedi" class="kedi-foto">
            <button class="degistir-butonu" onclick="kediDegistir()">Başka Kedi Göster 🔄</button>
        </div>
    </div>

    <script>
        // --- KEDİ GALERİSİ ---
        const kediListesi = ["Image (9).jpg", "Image (10).jpg", "Image (11).jpg", "Image (12).jpg", "Image (13).jpg", "Image (14).jpg", "Image (15).jpg"];
        let sira = 0;
        const modal = document.getElementById("kediPencerem");
        function modaliAc() { modal.style.display = "flex"; setTimeout(() => modal.classList.add("aktif"), 10); }
        function modaliKapat() { modal.classList.remove("aktif"); setTimeout(() => modal.style.display = "none", 300); }
        function kediDegistir() { sira = (sira + 1) % kediListesi.length; document.getElementById("kediResmi").src = kediListesi[sira]; }
        function pencereDisiKapat(event) { if (event.target === modal) modaliKapat(); }

        // --- OYUN MOTORU ---
        const canvas = document.getElementById("oyunTuvali");
        const ctx = canvas.getContext("2d");

        let frame = 0;
        let tekmeSayisi = 0;
        let parcaciklar = [];
        let efektYazilari = [];

        // KIZ KARAKTER (Saldırgan)
        const kiz = {
            startX: 150,
            x: 150,
            y: 300,
            hizX: 0,
            hizY: 0,
            durum: "yuruyor", // yuruyor, havalaniyor, tekme, geriDonuyor
            animFrame: 0
        };

        // ERKEK KARAKTER (Gözlüklü & Havalı Defans)
        const erkek = {
            x: 600,
            y: 295,
            sarsilmaX: 0,
            durum: "normal" // normal, darbeAldi
        };

        function tetikleUcanTekme() {
            if (kiz.durum === "yuruyor") {
                kiz.durum = "havalaniyor";
                kiz.hizY = -12;
                kiz.hizX = 14; // İleri doğru fırlama
            }
        }

        window.addEventListener("keydown", (e) => { if (e.code === "Space") { e.preventDefault(); tetikleUcanTekme(); } });
        canvas.addEventListener("mousedown", (e) => { e.preventDefault(); tetikleUcanTekme(); });

        // Çizim Tarzı Kalp Çizimi
        function drawHeart(x, y, size, color, broken = false) {
            ctx.save();
            ctx.beginPath();
            ctx.translate(x, y);
            
            if (broken) {
                // Kırık Kalp Sol Parça
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(-size/2, -size/2, -size, size/3, -2, size);
                ctx.lineTo(-2, 0);
                ctx.fillStyle = color;
                ctx.fill();
                
                // Kırık Kalp Sağ Parça
                ctx.beginPath();
                ctx.moveTo(2, 0);
                ctx.lineTo(2, size);
                ctx.bezierCurveTo(size, size/3, size/2, -size/2, 2, 0);
                ctx.fill();
            } else {
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(-size/2, -size/2, -size, size/3, 0, size);
                ctx.bezierCurveTo(size, size/3, size/2, -size/2, 0, 0);
                ctx.fillStyle = color;
                ctx.fill();
                ctx.lineWidth = 1.5;
                ctx.strokeStyle = "#b3001e";
                ctx.stroke();
            }
            ctx.restore();
        }

        function guncelle() {
            frame++;
            kiz.animFrame++;

            // Kızın Hareket Durum Makinesi
            if (kiz.durum === "havalaniyor") {
                kiz.x += kiz.hizX;
                kiz.y += kiz.hizY;
                kiz.hizY += 0.5; // Yerçekimi efekti

                // En tepe noktaya yakınken tekme pozisyonuna geç
                if (kiz.hizY > -2) {
                    kiz.durum = "tekme";
                }
            } else if (kiz.durum === "tekme") {
                kiz.x += kiz.hizX * 1.2;
                kiz.y += kiz.hizY;
                kiz.hizY += 0.6;

                // Erkek Karakterle Çarpışma Testi
                if (kiz.x + 80 >= erkek.x + erkek.sarsilmaX) {
                    // DARBE ANI!
                    erkek.durum = "darbeAldi";
                    erkek.sarsilmaX = 25;
                    kiz.durum = "geriDonuyor";
                    kiz.hizX = -10;
                    kiz.hizY = -5;
                    tekmeSayisi++;

                    // Kırık kalp parçacıkları saçılması
                    for (let i = 0; i < 8; i++) {
                        parcaciklar.push({
                            x: erkek.x + 10,
                            y: erkek.y + 20,
                            hizX: (Math.random() - 0.3) * 8,
                            hizY: (Math.random() - 0.7) * 7,
                            boyut: Math.random() * 12 + 10,
                            omur: 30
                        });
                    }

                    // Eğlenceli Yazı Efektleri
                    const kelimeler = ["BAM!", "AH!", "OUCH!", "KAPAAK!", "ISKALAMADI!"];
                    efektYazilari.push({
                        x: erkek.x - 20,
                        y: erkek.y - 40,
                        metin: kelimeler[Math.floor(Math.random() * kelimeler.length)],
                        omur: 25
                    });
                }

                // Iskalama Durumunda Yere Çakılma Emniyeti
                if (kiz.y >= 300) {
                    kiz.y = 300;
                    kiz.durum = "geriDonuyor";
                    kiz.hizX = -8;
                }
            } else if (kiz.durum === "geriDonuyor") {
                kiz.x += kiz.hizX;
                kiz.y += kiz.hizY;
                kiz.hizY += 0.5;

                if (kiz.y >= 300) {
                    kiz.y = 300;
                    kiz.hizY = 0;
                }

                if (kiz.x <= kiz.startX) {
                    kiz.x = kiz.startX;
                    kiz.durum = "yuruyor";
                }
            }

            // Erkeğin sarsıntı sönümlemesi
            if (erkek.durum === "darbeAldi") {
                erkek.sarsilmaX *= 0.85;
                if (erkek.sarsilmaX < 0.5) {
                    erkek.sarsilmaX = 0;
                    erkek.durum = "normal";
                }
            }

            // Parçacık güncelleme
            for (let i = parcaciklar.length - 1; i >= 0; i--) {
                parcaciklar[i].x += parcaciklar[i].hizX;
                parcaciklar[i].y += parcaciklar[i].hizY;
                parcaciklar[i].omur--;
                if (parcaciklar[i].omur <= 0) parcaciklar.splice(i, 1);
            }

            // Yazı güncelleme
            for (let i = efektYazilari.length - 1; i >= 0; i--) {
                efektYazilari[i].y -= 1;
                efektYazilari[i].omur--;
                if (efektYazilari[i].omur <= 0) efektYazilari.splice(i, 1);
            }
        }

        function ciz() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // --- DEĞİŞMEYEN ORİJİNAL ARKA PLAN (`Image (8)_2.jpg` Tarzı) ---
            // 1. Büyük Sarı Güneş
            ctx.fillStyle = "#ffde17";
            ctx.beginPath();
            ctx.arc(100, 90, 45, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = "#ffde17";
            ctx.lineWidth = 5;
            for(let a=0; a<Math.PI*2; a+=Math.PI/6) {
                ctx.beginPath();
                ctx.moveTo(100 + Math.cos(a)*55, 90 + Math.sin(a)*55);
                ctx.lineTo(100 + Math.cos(a)*80, 90 + Math.sin(a)*80);
                ctx.stroke();
            }

            // 2. Orijinal Mavi Bulutlar
            ctx.fillStyle = "#29b6f6";
            ctx.beginPath();
            ctx.arc(600, 70, 35, 0, Math.PI*2);
            ctx.arc(640, 60, 45, 0, Math.PI*2);
            ctx.arc(680, 70, 35, 0, Math.PI*2);
            ctx.fill();

            ctx.beginPath();
            ctx.arc(420, 90, 30, 0, Math.PI*2);
            ctx.arc(455, 80, 38, 0, Math.PI*2);
            ctx.arc(490, 90, 30, 0, Math.PI*2);
            ctx.fill();

            // Havada Duran Sabit Orijinal Kalpler
            drawHeart(350, 150, 20, "#ff4757");
            drawHeart(780, 240, 15, "#ff4757");


            // --- KIZ KARAKTERİN ÇİZİMİ & UÇAN TEKME ANİMASYONU ---
            ctx.save();
            ctx.translate(kiz.x, kiz.y);

            let kx = 0, ky = 30;
            ctx.strokeStyle = "#ff6b81"; // Çöp adam pembe hat rengi
            ctx.lineWidth = 4;
            ctx.lineCap = "round";

            // Kafa
            ctx.beginPath();
            ctx.arc(kx, ky - 18, 14, 0, Math.PI * 2);
            ctx.stroke();

            // Gözler ve Ağız
            ctx.fillStyle = "#ff6b81";
            ctx.beginPath();
            ctx.arc(kx - 5, ky - 20, 2, 0, Math.PI*2);
            ctx.arc(kx + 5, ky - 20, 2, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(kx, ky - 15, 5, 0, Math.PI);
            ctx.stroke();

            // Kahverengi Dalgalı Saçlar
            ctx.strokeStyle = "#8d6e63";
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(kx - 10, ky - 25);
            ctx.bezierCurveTo(kx - 25, ky - 15, kx - 15, ky, kx - 22, ky + 25);
            ctx.moveTo(kx + 10, ky - 25);
            ctx.bezierCurveTo(kx + 25, ky - 15, kx + 15, ky, kx + 22, ky + 25);
            ctx.stroke();

            // Pembe Fiyonk
            ctx.fillStyle = "#ff6b81";
            ctx.beginPath();
            ctx.moveTo(kx - 12, ky - 28); ctx.lineTo(kx - 22, ky - 34); ctx.lineTo(kx - 22, ky - 22); ctx.closePath(); ctx.fill();
            ctx.beginPath();
            ctx.moveTo(kx - 12, ky - 28); ctx.lineTo(kx - 2, ky - 34); ctx.lineTo(kx - 2, ky - 22); ctx.closePath(); ctx.fill();

            // Omurga Gövde
            ctx.strokeStyle = "#ff6b81";
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(kx, ky);
            ctx.lineTo(kx, ky + 45);
            ctx.stroke();

            // Kollar (Ayrıldıkları için artık serbestler)
            ctx.beginPath();
            if (kiz.durum === "tekme" || kiz.durum === "havalaniyor") {
                // Havada denge kolları
                ctx.moveTo(kx, ky + 10); ctx.lineTo(kx - 18, ky - 5);
                ctx.moveTo(kx, ky + 10); ctx.lineTo(kx + 15, ky - 8);
            } else {
                // Yürürken normal salınan kollar
                let kolSalinim = Math.sin(kiz.animFrame * 0.2) * 10;
                ctx.moveTo(kx, ky + 12); ctx.lineTo(kx - 15 + kolSalinim, ky + 28);
                ctx.moveTo(kx, ky + 12); ctx.lineTo(kx + 15 - kolSalinim, ky + 28);
            }
            ctx.stroke();

            // Bacaklar (Uçan tekme pozu burayı tetikliyor!)
            ctx.beginPath();
            if (kiz.durum === "tekme") {
                // ÖN BACAK TAM İLERİ DOĞRU UZANMIŞ SÜPER UÇAN TEKME POZİSYONU
                ctx.moveTo(kx, ky + 45);
                ctx.lineTo(kx + 45, ky + 30); // Tekmeyi basan bacak ileri uzanır
                
                // Arka bacak havada bükülü kalır
                ctx.moveTo(kx, ky + 45);
                ctx.lineTo(kx - 15, ky + 65);
            } else if (kiz.durum === "havalaniyor") {
                // Havaya yükselirken bacakları bükme hareketi
                ctx.moveTo(kx, ky + 45); ctx.lineTo(kx - 8, ky + 70);
                ctx.moveTo(kx, ky + 45); ctx.lineTo(kx + 12, ky + 68);
            } else {
                // Yerdeki yürüme adımları
                let adim = Math.sin(kiz.animFrame * 0.15) * 15;
                ctx.moveTo(kx, ky + 45); ctx.lineTo(kx - 10 + adim, ky + 80);
                ctx.moveTo(kx, ky + 45); ctx.lineTo(kx + 10 - adim, ky + 80);
            }
            ctx.stroke();

            ctx.restore();


            // --- ERKEK KARAKTERİN ÇİZİMİ (Gözlükler ve Saç Korumalı) ---
            ctx.save();
            ctx.translate(erkek.x + erkek.sarsilmaX, erkek.y);

            let ex = 0, ey = 30;
            ctx.strokeStyle = "#ff6b81";
            ctx.lineWidth = 4;

            // Kafa
            ctx.beginPath();
            ctx.arc(ex, ey - 18, 15, 0, Math.PI * 2);
            ctx.stroke();

            // SAÇI KORUNDU ("boyom" yazılı orijinal karalama yapısı)
            ctx.fillStyle = "#000000";
            ctx.font = "bold 13px 'Arial'";
            ctx.fillText("boyom", ex - 18, ey - 36);
            ctx.fillRect(ex - 15, ey - 34, 30, 6);

            // GÜNEŞ GÖZLÜKLERİ KORUNDU (Büyük havalı siyah camlar)
            ctx.fillStyle = "#000000";
            ctx.fillRect(ex - 14, ey - 24, 28, 10);
            ctx.strokeStyle = "#000000";
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(ex - 14, ey - 20); ctx.lineTo(ex - 18, ey - 18); ctx.stroke();

            // Ağız (Darbe aldığında şaşkınlık yuvarlağına dönüşür, normalken gülümser)
            ctx.strokeStyle = "#ff6b81";
            ctx.lineWidth = 3;
            ctx.beginPath();
            if (erkek.durum === "darbeAldi") {
                ctx.arc(ex, ey - 11, 4, 0, Math.PI * 2); // "O" şeklinde şaşırmış ağız
            } else {
                ctx.arc(ex, ey - 12, 5, 0, Math.PI); // Mutlu gülüş
            }
            ctx.stroke();

            // Gövde
            ctx.lineWidth = 4;
            ctx.strokeStyle = "#ff6b81";
            ctx.beginPath(); ctx.moveTo(ex, ey); ctx.lineTo(ex, ey + 50); ctx.stroke();

            // Kollar (Çizimdeki gibi yanlardaki pembe balonumsu efektlerle süslü)
            ctx.beginPath();
            if (erkek.durum === "darbeAldi") {
                // Darbe yiyince kollar havaya fırlar
                ctx.moveTo(ex, ey + 12); ctx.lineTo(ex - 22, ey - 5);
                ctx.moveTo(ex, ey + 12); ctx.lineTo(ex + 22, ey - 5);
            } else {
                // Normal duruş kolları
                ctx.moveTo(ex, ey + 12); ctx.lineTo(ex - 20, ey + 28);
                ctx.moveTo(ex, ey + 12); ctx.lineTo(ex + 20, ey + 28);
            }
            ctx.stroke();

            // Koldaki Orijinal Yuvarlak Pembe Balon Yapıları
            ctx.fillStyle = "rgba(255, 107, 129, 0.6)";
            ctx.beginPath();
            ctx.arc(ex - 15, ey + 20, 10, 0, Math.PI*2);
            ctx.arc(ex + 15, ey + 20, 10, 0, Math.PI*2);
            ctx.fill();

            // Bacaklar
            ctx.beginPath();
            if (erkek.durum === "darbeAldi") {
                // Sendelerken bacaklar açılır
                ctx.moveTo(ex, ey + 50); ctx.lineTo(ex - 20, ey + 85);
                ctx.moveTo(ex, ey + 50); ctx.lineTo(ex + 10, ey + 85);
            } else {
                ctx.moveTo(ex, ey + 50); ctx.lineTo(ex - 12, ey + 85);
                ctx.moveTo(ex, ey + 50); ctx.lineTo(ex + 12, ey + 85);
            }
            ctx.stroke();

            ctx.restore();


            // --- DARBE PARÇACIKLARI (Kırık Kalpler Saçılır) ---
            parcaciklar.forEach(p => {
                drawHeart(p.x, p.y, p.boyut / 2, "#ff4757", true); // Kırık kalp çizimi true gönderildi
            });

            // REAKSİYON METİNLERİ
            efektYazilari.forEach(y => {
                ctx.fillStyle = "#ff4757";
                ctx.font = "bold 26px 'Caveat', cursive";
                ctx.fillText(y.metin, y.x, y.y);
            });


            // --- YEŞİL ÇİMENLİ TEPELER (Orijinal Zemin Çizgileri) ---
            ctx.fillStyle = "#4caf50";
            ctx.beginPath();
            ctx.moveTo(0, canvas.height);
            for (let i = 0; i <= canvas.width + 150; i += 150) {
                ctx.lineTo(i, 400);
                ctx.bezierCurveTo(i + 50, 360, i + 100, 360, i + 150, 400);
            }
            ctx.lineTo(canvas.width, canvas.height);
            ctx.fill();
            
            ctx.strokeStyle = "#2e7d32";
            ctx.lineWidth = 4;
            ctx.beginPath();
            for (let i = 0; i <= canvas.width + 150; i += 150) {
                ctx.moveTo(i, 400);
                ctx.bezierCurveTo(i + 50, 360, i + 100, 360, i + 150, 400);
            }
            ctx.stroke();


            // SKOR TABELASI (Tekme Sayacı)
            ctx.fillStyle = "rgba(255, 255, 255, 0.85)";
            ctx.strokeStyle = "#ff4757";
            ctx.lineWidth = 2;
            ctx.fillRect(20, 20, 220, 45);
            ctx.strokeRect(20, 20, 220, 45);

            ctx.fillStyle = "#1e1b4b";
            ctx.font = "bold 16px 'Inter', sans-serif";
            ctx.fillText(`YENEN TEKME: ${tekmeSayisi} 💢`, 40, 48);
        }

        function döngü() {
            guncelle();
            ciz();
            requestAnimationFrame(döngü);
        }

        döngü();
    </script>
</body>
</html>
