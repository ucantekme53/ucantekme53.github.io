<!DOCTYPE html>
<html lang="tr">
<head>
    <meta name="robots" content="noindex, nofollow">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❤️</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body { 
            background: radial-gradient(circle at top, #1e1b4b 0%, #090514 100%);
            color: #f8fafc; 
            text-align: center; 
            font-family: 'Inter', sans-serif; 
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        h1 { 
            font-family: 'Caveat', cursive;
            font-size: 3.2rem; 
            font-weight: 700;
            color: #ff6b81;
            margin-bottom: 30px;
            margin-top: 10px;
            letter-spacing: 0.5px;
        }

        .oyun-konteyner {
            max-width: 850px;
            margin: 0 auto;
            position: relative;
        }

        canvas {
            background: #ffffff; 
            border-radius: 24px;
            border: 3px solid #ff6b81;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: block;
            width: 100%;
            max-width: 850px;
            height: auto;
            cursor: pointer;
        }
    </script>
</head>
<body>

    <h1>ucan tekme atmak için ekrana dokun</h1>

    <div class="oyun-konteyner">
        <canvas id="oyunTuvali" width="900" height="500"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("oyunTuvali");
        const ctx = canvas.getContext("2d");

        let frame = 0;
        let kalpler = [];
        let efektYazilari = [];
        let sarilmaKalpleri = [];

        const kiz = {
            startX: 180,
            x: 180,
            y: 300,
            hizX: 0,
            hizY: 0,
            durum: "yuruyor", // yuruyor, havalaniyor, geriDonuyor, kosuyor, sarildi
            animFrame: 0
        };

        const erkek = {
            startX: 620,
            x: 620,
            y: 295,
            sarsilmaX: 0,
            hizX: 0,
            durum: "normal", // normal, darbeAldi, bekliyor, kosuyor, sarildi
            animFrame: 0
        };

        function tetikleUcanTekme() {
            if (kiz.durum === "yuruyor") {
                kiz.durum = "havalaniyor";
                kiz.hizY = -11;
                kiz.hizX = 13;
                erkek.durum = "normal";
                erkek.x = erkek.startX;
                kiz.x = kiz.startX;
                sarilmaKalpleri = [];
            }
        }

        window.addEventListener("keydown", (e) => { if (e.code === "Space") { e.preventDefault(); tetikleUcanTekme(); } });
        canvas.addEventListener("mousedown", (e) => { e.preventDefault(); tetikleUcanTekme(); });
        canvas.addEventListener("touchstart", (e) => { e.preventDefault(); tetikleUcanTekme(); });

        function drawHeart(x, y, size, color, broken = false) {
            ctx.save();
            ctx.beginPath();
            ctx.translate(x, y);
            
            if (broken) {
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(-size/2, -size/2, -size, size/3, -2, size);
                ctx.lineTo(-2, 0);
                ctx.fillStyle = color;
                ctx.fill();
                
                ctx.beginPath();
                ctx.moveTo(2, 0);
                ctx.lineTo(2, size);
                ctx.bezierCurveTo(size, size/3, size/2, -size/2, 2, 0);
                ctx.fill();
            } else {
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(-size/2, -size/2, -size, size/3, 0, size);
                ctx.bezierCurveTo(size, size/3, size/2, -size/2, 0, 0);
                ctx.fillStyle = color;
                ctx.fill();
                ctx.lineWidth = 1.5;
                ctx.strokeStyle = "#b3001e";
                ctx.stroke();
            }
            ctx.restore();
        }

        function guncelle() {
            frame++;
            kiz.animFrame++;
            erkek.animFrame++;

            // --- FİZİK MOTORU VE DURUM YÖNETİMİ ---
            if (kiz.durum === "havalaniyor") {
                kiz.x += kiz.hizX;
                kiz.y += kiz.hizY;
                kiz.hizY += 0.5;

                // Vuruş Anı
                if (kiz.x + 75 >= erkek.x + erkek.sarsilmaX) {
                    erkek.durum = "darbeAldi";
                    erkek.sarsilmaX = 20;
                    kiz.durum = "geriDonuyor";
                    kiz.hizX = -9;
                    kiz.hizY = -4;

                    // Kırık Kalp Parçacıkları
                    for (let i = 0; i < 6; i++) {
                        kalpler.push({
                            x: erkek.x,
                            y: erkek.y + 20,
                            hizX: (Math.random() - 0.3) * 6,
                            hizY: (Math.random() - 0.7) * 6,
                            boyut: Math.random() * 10 + 8,
                            omur: 25
                        });
                    }

                    // Tepki yazısı
                    efektYazilari.push({
                        x: erkek.x - 60,
                        y: erkek.y - 45,
                        metin: "ne yaptığına bak :)",
                        omur: 50 // Görünme süresi
                    });
                }

                if (kiz.y >= 300) {
                    kiz.y = 300;
                    kiz.durum = "geriDonuyor";
                    kiz.hizX = -8;
                }
            } else if (kiz.durum === "geriDonuyor") {
                kiz.x += kiz.hizX;
                kiz.y += kiz.hizY;
                kiz.hizY += 0.5;

                if (kiz.y >= 300) {
                    kiz.y = 300;
                    kiz.hizY = 0;
                }

                if (kiz.x <= kiz.startX) {
                    kiz.x = kiz.startX;
                    kiz.durum = "yuruyor";
                    erkek.durum = "bekliyor";
                }
            }

            if (erkek.durum === "darbeAldi") {
                erkek.sarsilmaX *= 0.88;
                if (erkek.sarsilmaX < 0.5) {
                    erkek.sarsilmaX = 0;
                }
            }

            // Yazı kaybolunca koşma evresi başlasın
            if (erkek.durum === "bekliyor" && efektYazilari.length === 0) {
                kiz.durum = "kosuyor";
                erkek.durum = "kosuyor";
                kiz.hizX = 4;
                erkek.hizX = -4;
            }

            // Koşma ve Sarılma Buluşması
            if (kiz.durum === "kosuyor" && erkek.durum === "kosuyor") {
                kiz.x += kiz.hizX;
                erkek.x += erkek.hizX;

                // Aradaki mesafe kapandığında (Kucaklaşma noktası)
                if (kiz.x + 35 >= erkek.x - 10) {
                    kiz.durum = "sarildi";
                    erkek.durum = "sarildi";
                    kiz.x = 385; // Ortak merkez noktası
                    erkek.x = 415;
                }
            }

            // Sarılma kalpleri efekti
            if (kiz.durum === "sarildi") {
                if (frame % 8 === 0) {
                    sarilmaKalpleri.push({
                        x: 400 + (Math.random() - 0.5) * 40,
                        y: 280,
                        hizY: -(Math.random() * 2 + 1),
                        boyut: Math.random() * 8 + 6,
                        omur: 30
                    });
                }
            }

            // Efekt güncellemeleri
            for (let i = kalpler.length - 1; i >= 0; i--) {
                kalpler[i].x += kalpler[i].hizX;
                kalpler[i].y += kalpler[i].hizY;
                kalpler[i].omur--;
                if (kalpler[i].omur <= 0) kalpler.splice(i, 1);
            }

            for (let i = efektYazilari.length - 1; i >= 0; i--) {
                efektYazilari[i].y -= 0.4;
                efektYazilari[i].omur--;
                if (efektYazilari[i].omur <= 0) efektYazilari.splice(i, 1);
            }

            for (let i = sarilmaKalpleri.length - 1; i >= 0; i--) {
                sarilmaKalpleri[i].y += sarilmaKalpleri[i].hizY;
                sarilmaKalpleri[i].omur--;
                if (sarilmaKalpleri[i].omur <= 0) sarilmaKalpleri.splice(i, 1);
            }
        }

        function ciz() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // --- ARKA PLAN ---
            ctx.fillStyle = "#ffde17";
            ctx.beginPath(); ctx.arc(120, 100, 45, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = "#ffde17"; ctx.lineWidth = 5;
            for(let a=0; a<Math.PI*2; a+=Math.PI/6) {
                ctx.beginPath();
                ctx.moveTo(120 + Math.cos(a)*55, 100 + Math.sin(a)*55);
                ctx.lineTo(120 + Math.cos(a)*78, 100 + Math.sin(a)*78);
                ctx.stroke();
            }

            ctx.fillStyle = "#29b6f6";
            ctx.beginPath(); ctx.arc(640, 80, 35, 0, Math.PI*2); ctx.arc(680, 70, 45, 0, Math.PI*2); ctx.arc(720, 80, 35, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(440, 100, 30, 0, Math.PI*2); ctx.arc(475, 90, 38, 0, Math.PI*2); ctx.arc(510, 100, 30, 0, Math.PI*2); ctx.fill();

            drawHeart(370, 160, 20, "#ff4757");
            drawHeart(790, 230, 15, "#ff4757");

            // --- KIZ KARAKTER ---
            ctx.save();
            ctx.translate(kiz.x, kiz.y);

            let kx = 0, ky = 30;
            ctx.strokeStyle = "#ff6b81"; 
            ctx.lineWidth = 4;
            ctx.lineCap = "round";

            // Kafa ve yüz
            ctx.beginPath(); ctx.arc(kx, ky - 18, 14, 0, Math.PI * 2); ctx.stroke();
            ctx.fillStyle = "#ff6b81";
            ctx.beginPath(); ctx.arc(kx - 5, ky - 20, 2, 0, Math.PI*2); ctx.arc(kx + 5, ky - 20, 2, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(kx, ky - 15, 5, 0, Math.PI); ctx.stroke();

            // Saçlar ve Fiyonk
            ctx.strokeStyle = "#8d6e63"; ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(kx - 10, ky - 25); ctx.bezierCurveTo(kx - 25, ky - 15, kx - 15, ky, kx - 22, ky + 25);
            ctx.moveTo(kx + 10, ky - 25); ctx.bezierCurveTo(kx + 25, ky - 15, kx + 15, ky, kx + 22, ky + 25);
            ctx.stroke();
            ctx.fillStyle = "#ff6b81";
            ctx.beginPath(); ctx.moveTo(kx - 12, ky - 28); ctx.lineTo(kx - 22, ky - 34); ctx.lineTo(kx - 22, ky - 22); ctx.closePath(); ctx.fill();
            ctx.beginPath(); ctx.moveTo(kx - 12, ky - 28); ctx.lineTo(kx - 2, ky - 34); ctx.lineTo(kx - 2, ky - 22); ctx.closePath(); ctx.fill();

            // Gövde
            ctx.strokeStyle = "#ff6b81"; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(kx, ky); ctx.lineTo(kx, ky + 45); ctx.stroke();

            // Kollar
            ctx.beginPath();
            if (kiz.durum === "havalaniyor") {
                ctx.moveTo(kx, ky + 10); ctx.lineTo(kx - 18, ky - 2);
                ctx.moveTo(kx, ky + 10); ctx.lineTo(kx + 12, ky - 5);
            } else if (kiz.durum === "kosuyor") {
                // Sevgiyle öne uzanan kollar
                ctx.moveTo(kx, ky + 12); ctx.lineTo(kx + 22, ky + 6);
                ctx.moveTo(kx, ky + 12); ctx.lineTo(kx + 18, ky + 22);
            } else if (kiz.durum === "sarildi") {
                // Erkeği saran kol pozisyonu
                ctx.moveTo(kx, ky + 12); ctx.lineTo(kx + 25, ky + 15);
            } else {
                let salinim = Math.sin(kiz.animFrame * 0.15) * 8;
                ctx.moveTo(kx, ky + 12); ctx.lineTo(kx - 15 + salinim, ky + 28);
                ctx.moveTo(kx, ky + 12); ctx.lineTo(kx + 15 - salinim, ky + 28);
            }
            ctx.stroke();

            // Bacaklar
            ctx.beginPath();
            if (kiz.durum === "havalaniyor") {
                ctx.moveTo(kx, ky + 45); ctx.lineTo(kx + 44, ky + 32); 
                ctx.moveTo(kx, ky + 45); ctx.lineTo(kx - 12, ky + 62);
            } else if (kiz.durum === "kosuyor") {
                let adim = Math.sin(kiz.animFrame * 0.25) * 15;
                ctx.moveTo(kx, ky + 45); ctx.lineTo(kx - 8 + adim, ky + 80);
                ctx.moveTo(kx, ky + 45); ctx.lineTo(kx + 8 - adim, ky + 80);
            } else if (kiz.durum === "sarildi") {
                ctx.moveTo(kx, ky + 45); ctx.lineTo(kx - 3, ky + 80);
                ctx.moveTo(kx, ky + 45); ctx.lineTo(kx + 5, ky + 80);
            } else {
                let adim = Math.sin(kiz.animFrame * 0.12) * 12;
                ctx.moveTo(kx, ky + 45); ctx.lineTo(kx - 10 + adim, ky + 80);
                ctx.moveTo(kx, ky + 45); ctx.lineTo(kx + 10 - adim, ky + 80);
            }
            ctx.stroke();

            ctx.restore();


            // --- ERKEK KARAKTER ---
            ctx.save();
            ctx.translate(erkek.x + (erkek.durum === "darbeAldi" ? erkek.sarsilmaX : 0), erkek.y);

            let ex = 0, ey = 30;
            ctx.strokeStyle = "#ff6b81"; ctx.lineWidth = 4;

            // Kafa
            ctx.beginPath(); ctx.arc(ex, ey - 18, 15, 0, Math.PI * 2); ctx.stroke();

            // Saçlar
            ctx.fillStyle = "#000000";
            ctx.beginPath();
            ctx.arc(ex - 8, ey - 32, 7, 0, Math.PI * 2); ctx.arc(ex, ey - 34, 8, 0, Math.PI * 2); ctx.arc(ex + 8, ey - 31, 7, 0, Math.PI * 2);
            ctx.fill();

            // Gözlükler
            ctx.fillStyle = "#000000";
            ctx.beginPath();
            ctx.moveTo(ex - 16, ey - 23); ctx.bezierCurveTo(ex - 8, ey - 25, ex + 8, ey - 22, ex + 17, ey - 20); 
            ctx.lineTo(ex + 15, ey - 10); ctx.bezierCurveTo(ex + 5, ey - 11, ex - 8, ey - 14, ex - 16, ey - 12); 
            ctx.closePath(); ctx.fill();
            ctx.strokeStyle = "#000000"; ctx.lineWidth = 2.5;
            ctx.beginPath(); ctx.moveTo(ex - 15, ey - 18); ctx.lineTo(ex - 20, ey - 16); ctx.stroke();

            // Ağız
            ctx.strokeStyle = "#ff6b81"; ctx.lineWidth = 3;
            ctx.beginPath();
            if (erkek.durum === "darbeAldi") {
                ctx.arc(ex, ey - 10, 4, 0, Math.PI * 2); 
            } else if (erkek.durum === "sarildi" || erkek.durum === "kosuyor") {
                ctx.arc(ex, ey - 11, 6, 0, Math.PI); // Mutlu gülümseme
            } else {
                ctx.arc(ex, ey - 11, 5, 0, Math.PI); 
            }
            ctx.stroke();

            // Gövde
            ctx.lineWidth = 4; ctx.strokeStyle = "#ff6b81";
            ctx.beginPath(); ctx.moveTo(ex, ey); ctx.lineTo(ex, ey + 50); ctx.stroke();

            // Kollar
            ctx.beginPath();
            if (erkek.durum === "darbeAldi") {
                ctx.moveTo(ex, ey + 12); ctx.lineTo(ex - 20, ey - 2);
                ctx.moveTo(ex, ey + 12); ctx.lineTo(ex + 20, ey - 2);
            } else if (erkek.durum === "kosuyor") {
                // Karşıdan gelene sarılmak için açılan kollar
                ctx.moveTo(ex, ey + 12); ctx.lineTo(ex - 22, ky + 6);
                ctx.moveTo(ex, ey + 12); ctx.lineTo(ex - 18, ky + 22);
            } else if (erkek.durum === "sarildi") {
                // Kızı saran kol pozisyonu
                ctx.moveTo(ex, ey + 12); ctx.lineTo(ex - 25, ky + 15);
            } else {
                ctx.moveTo(ex, ey + 12); ctx.lineTo(ex - 18, ey + 28);
                ctx.moveTo(ex, ey + 12); ctx.lineTo(ex + 18, ey + 28);
            }
            ctx.stroke();

            // Pembe Balon Yapıları
            ctx.fillStyle = "rgba(255, 107, 129, 0.6)";
            ctx.beginPath(); ctx.arc(ex - 14, ey + 20, 10, 0, Math.PI*2); ctx.arc(ex + 14, ey + 20, 10, 0, Math.PI*2); ctx.fill();

            // Bacaklar
            ctx.beginPath();
            if (erkek.durum === "darbeAldi") {
                ctx.moveTo(ex, ey + 50); ctx.lineTo(ex - 18, ey + 85);
                ctx.moveTo(ex, ey + 50); ctx.lineTo(ex + 8, ey + 85);
            } else if (erkek.durum === "kosuyor") {
                let adim = Math.sin(erkek.animFrame * 0.25) * 15;
                ctx.moveTo(ex, ey + 50); ctx.lineTo(ex - 8 + adim, ey + 85);
                ctx.moveTo(ex, ey + 50); ctx.lineTo(ex + 8 - adim, ey + 85);
            } else if (erkek.durum === "sarildi") {
                ctx.moveTo(ex, ey + 50); ctx.lineTo(ex - 5, ey + 85);
                ctx.moveTo(ex, ey + 50); ctx.lineTo(ex + 3, ey + 85);
            } else {
                ctx.moveTo(ex, ey + 50); ctx.lineTo(ex - 12, ey + 85);
                ctx.moveTo(ex, ey + 50); ctx.lineTo(ex + 12, ey + 85);
            }
            ctx.stroke();

            ctx.restore();

            // --- EFEKTLER VE METİNLER ---
            kalpler.forEach(p => drawHeart(p.x, p.y, p.boyut / 2, "#ff4757", true));
            sarilmaKalpleri.forEach(h => drawHeart(h.x, h.y, h.boyut, "#ff3838", false));

            efektYazilari.forEach(y => {
                ctx.fillStyle = "#ff4757";
                ctx.font = "bold 26px 'Caveat', cursive";
                ctx.fillText(y.metin, y.x, y.y);
            });

            // --- YEŞİL ÇİMENLİ TEPELER ---
            ctx.fillStyle = "#4caf50";
            ctx.beginPath(); ctx.moveTo(0, canvas.height);
            for (let i = 0; i <= canvas.width + 150; i += 150) {
                ctx.lineTo(i, 400); ctx.bezierCurveTo(i + 50, 360, i + 100, 360, i + 150, 400);
            }
            ctx.lineTo(canvas.width, canvas.height); ctx.fill();
            
            ctx.strokeStyle = "#2e7d32"; ctx.lineWidth = 4; ctx.beginPath();
            for (let i = 0; i <= canvas.width + 150; i += 150) {
                ctx.moveTo(i, 400); ctx.bezierCurveTo(i + 50, 360, i + 100, 360, i + 150, 400);
            }
            ctx.stroke();
        }

        function döngü() {
            guncelle();
            ciz();
            requestAnimationFrame(döngü);
        }

        döngü();
    </script>
</body>
</html>
