<!DOCTYPE html>
<html lang="tr">
<head>
    <meta name="robots" content="noindex, nofollow">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❤️</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body { 
            background: radial-gradient(circle at top, #1e1b4b 0%, #090514 100%);
            color: #f8fafc; 
            text-align: center; 
            font-family: 'Inter', sans-serif; 
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        h1 { 
            font-family: 'Caveat', cursive;
            font-size: 3.5rem; 
            font-weight: 700;
            color: #ff6b81;
            margin-bottom: 30px;
            margin-top: 10px;
            letter-spacing: 0.5px;
        }

        .oyun-konteyner {
            max-width: 850px;
            margin: 0 auto;
            position: relative;
        }

        canvas {
            background: #ffffff; 
            border-radius: 24px;
            border: 3px solid #ff6b81;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: block;
            width: 100%;
            max-width: 850px;
            height: auto;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>ucan tekme atmak için ekrana dokun</h1>

    <div class="oyun-konteyner">
        <canvas id="oyunTuvali" width="900" height="500"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("oyunTuvali");
        const ctx = canvas.getContext("2d");

        let frame = 0;
        let kalpler = [];
        let efektYazilari = [];
        let sarilmaKalpleri = [];
        let yenenTekmeSkoru = 0;
        let dusmeZamanlayicisi = 0;

        const kiz = {
            startX: 180,
            x: 180,
            y: 300,
            hizX: 0,
            hizY: 0,
            durum: "yuruyor", 
            animFrame: 0
        };

        const erkek = {
            startX: 620,
            x: 620,
            y: 295,
            sarsilmaX: 0,
            durum: "normal", 
            animFrame: 0,
            aci: 0 
        };

        function tetikleUcanTekme() {
            if (kiz.durum === "sarildi") {
                yenenTekmeSkoru = 0;
                kiz.x = kiz.startX;
                kiz.y = 300;
                erkek.x = erkek.startX;
                erkek.y = 295;
                erkek.durum = "normal";
                erkek.sarsilmaX = 0;
                erkek.aci = 0;
                sarilmaKalpleri = [];
                efektYazilari = [];
                kalpler = [];
                kiz.durum = "yuruyor";
                return;
            }

            if (kiz.durum === "yuruyor") {
                kiz.durum = "havalaniyor";
                kiz.hizY = -11;
                kiz.hizX = 13;
                erkek.durum = "normal";
                erkek.x = 620;
                erkek.aci = 0;
                sarilmaKalpleri = [];
                efektYazilari = [];
            }
        }

        window.addEventListener("keydown", (e) => { if (e.code === "Space") { e.preventDefault(); tetikleUcanTekme(); } });
        canvas.addEventListener("mousedown", (e) => { e.preventDefault(); tetikleUcanTekme(); });
        canvas.addEventListener("touchstart", (e) => { e.preventDefault(); tetikleUcanTekme(); });

        function drawHeart(x, y, size, color, broken = false) {
            ctx.save();
            ctx.beginPath();
            ctx.translate(x, y);
            
            if (broken) {
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(-size/2, -size/2, -size, size/3, -2, size);
                ctx.lineTo(-2, 0);
                ctx.fillStyle = color;
                ctx.fill();
                
                ctx.beginPath();
                ctx.moveTo(2, 0);
                ctx.lineTo(2, size);
                ctx.bezierCurveTo(size, size/3, size/2, -size/2, 2, 0);
                ctx.fill();
            } else {
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(-size/2, -size/2, -size, size/3, 0, size);
                ctx.bezierCurveTo(size, size/3, size/2, -size/2, 0, 0);
                ctx.fillStyle = color;
                ctx.fill();
                ctx.lineWidth = 1.5;
                ctx.strokeStyle = "#b3001e";
                ctx.stroke();
            }
            ctx.restore();
        }

        function guncelle() {
            frame++;
            kiz.animFrame++;
            erkek.animFrame++;

            if (kiz.durum === "havalaniyor") {
                kiz.x += kiz.hizX;
                kiz.y += kiz.hizY;
                kiz.hizY += 0.5;

                if (kiz.x + 75 >= PointX()) {
                    yenenTekmeSkoru++;
                    kiz.durum = "geriDonuyor";
                    kiz.hizX = -9;
                    kiz.hizY = -4;

                    if (yenenTekmeSkoru >= 3) {
                        erkek.durum = "yereDusuldu";
                        dusmeZamanlayicisi = 110; 
                    } else {
                        erkek.durum = "darbeAldi";
                        erkek.sarsilmaX = 20;
                    }

                    for (let i = 0; i < 6; i++) {
                        kalpler.push({
                            x: erkek.x,
                            y: PointY() + 20,
                            hizX: (Math.random() - 0.3) * 6,
                            hizY: (Math.random() - 0.7) * 6,
                            boyut: Math.random() * 10 + 8,
                            omur: 25
                        });
                    }

                    efektYazilari.push({
                        x: erkek.x - 60,
                        y: 200,
                        metin: "ne yaptığına bak :)",
                        omur: 50 
                    });
                }

                if (kiz.y >= 300) {
                    kiz.y = 300;
                    kiz.durum = "geriDonuyor";
                    kiz.hizX = -8;
                }
            } else if (kiz.durum === "geriDonuyor") {
                kiz.x += kiz.hizX;
                kiz.y += kiz.hizY;
                kiz.hizY += 0.5;

                if (kiz.y >= 300) {
                    kiz.y = 300;
                    kiz.hizY = 0;
                }

                if (kiz.x <= kiz.startX) {
                    kiz.x = kiz.startX;
                    if (yenenTekmeSkoru >= 3) {
                        kiz.durum = "yerindeBekliyor";
                    } else {
                        kiz.durum = "yuruyor";
                        erkek.durum = "normal";
                    }
                }
            }

            if (erkek.durum === "darbeAldi") {
                erkek.sarsilmaX *= 0.88;
                if (erkek.sarsilmaX < 0.5) {
                    erkek.sarsilmaX = 0;
                }
            }

            if (erkek.durum === "yereDusuldu") {
                if (erkek.aci < Math.PI / 2) {
                    erkek.aci += 0.08; 
                }
                dusmeZamanlayicisi--;
                if (dusmeZamanlayicisi <= 0) {
                    erkek.durum = "yerdenKalkiyor";
                }
            }

            if (erkek.durum === "yerdenKalkiyor") {
                if (erkek.aci > 0) {
                    erkek.aci -= 0.08;
                } else {
                    erkek.aci = 0;
                    kiz.durum = "kosuyor";
                    erkek.durum = "kosuyor";
                    kiz.hizX = 4;
                    erkek.hizX = -4;
                }
            }

            if (kiz.durum === "kosuyor" && erkek.durum === "kosuyor") {
                kiz.x += kiz.hizX;
                erkek.x += erkek.hizX;

                if (kiz.x + 35 >= erkek.x - 10) {
                    kiz.durum = "sarildi";
                    erkek.durum = "sarildi";
                    kiz.x = 385; 
                    erkek.x = 415;
                }
            }

            if (kiz.durum === "sarildi") {
                if (frame % 8 === 0) {
                    sarilmaKalpleri.push({
                        x: 400 + (Math.random() - 0.5) * 40,
                        y: 280,
                        hizY: -(Math.random() * 2 + 1),
                        boyut: Math.random() * 8 + 6,
                        omur: 30
                    });
                }
            }

            for (let i = kalpler.length - 1; i >= 0; i--) {
                kalpler[i].x += kalpler[i].hizX;
                kalpler[i].y += kalpler[i].hizY;
                kalpler[i].omur--;
                if (kalpler[i].omur <= 0) kalpler.splice(i, 1);
            }

            for (let i = efektYazilari.length - 1; i >= 0; i--) {
                efektYazilari[i].y -= 0.4;
                efektYazilari[i].omur--;
                if (efektYazilari[i].omur <= 0) efektYazilari.splice(i, 1);
            }

            for (let i = sarilmaKalpleri.length - 1; i >= 0; i--) {
                sarilmaKalpleri[i].y += sarilmaKalpleri[i].hizY;
                sarilmaKalpleri[i].omur--;
                if (sarilmaKalpleri[i].omur <= 0) sarilmaKalpleri.splice(i, 1);
            }
        }

        function PointX() { return erkek.x + (erkek.durum === "darbeAldi" ? PointSarsilma() : 0); }
        function PointY() { return erkek.y; }
        function PointSarsilma() { return erkek.sarsilmaX; }

        function ciz() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // GÜNEŞ (Yerinde duruyor ☀️)
            ctx.fillStyle = "#ffde17";
            ctx.beginPath(); ctx.arc(120, 100, 45, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = "#ffde17"; ctx.lineWidth = 5;
            for(let a=0; a<Math.PI*2; a+=Math.PI/6) {
                ctx.beginPath();
                ctx.moveTo(120 + Math.cos(a)*55, 100 + Math.sin(a)*55);
                ctx.lineTo(120 + Math.cos(a)*78, 100 + Math.sin(a)*78);
                ctx.stroke();
            }

            // BULUTLAR
            ctx.fillStyle = "#29b6f6";
            ctx.beginPath(); ctx.arc(640, 80, 35, 0, Math.PI*2); ctx.arc(680, 70, 45, 0, Math.PI*2); ctx.arc(720, 80, 35, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(440, 100, 30, 0, Math.PI*2); ctx.arc(475, 90, 38, 0, Math.PI*2); ctx.arc(510, 100, 30, 0, Math.PI*2); ctx.fill();

            drawHeart(370, 160, 20, "#ff4757");
            drawHeart(790, 230, 15, "#ff4757");

            // KIZ KARAKTERİ
            ctx.save();
            ctx.translate(kiz.x, kiz.y);
            let kx = 0, ky = 30;
            ctx.strokeStyle = "#ff6b81"; ctx.lineWidth = 4; ctx.lineCap = "round";

            ctx.beginPath(); ctx.arc(kx, ky - 18, 14, 0, Math.PI * 2); ctx.stroke();
            ctx.fillStyle = "#ff6b81";
            ctx.beginPath(); ctx.arc(kx - 5, ky - 20, 2, 0,
